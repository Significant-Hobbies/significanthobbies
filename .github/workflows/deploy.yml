name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'src/**'
      - 'public/**'
      - 'drizzle/**'
      - 'scripts/cf-build.mjs'
      - 'scripts/overlay-astro-landing.mjs'
      - 'scripts/run-overlay-astro-landing.mjs'
      - 'landing-astro/**'
      - 'drizzle.config.ts'
      - 'next.config.ts'
      - 'open-next.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
      - 'wrangler.toml'
  pull_request:
    branches: [main]

jobs:
  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Prepare pnpm
        run: |
          corepack enable
          if node -e "const pm=require('./package.json').packageManager||''; process.exit(pm.startsWith('pnpm@')?0:1)"; then
            corepack install
          else
            corepack prepare pnpm@10.32.1 --activate
          fi
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --minify
      - name: Purge edge cache for landing HTML
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          zone_id=$(curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones?name=significanthobbies.com" \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const j=JSON.parse(d);process.stdout.write(j.result?.[0]?.id||'')})")
          if [ -z "$zone_id" ]; then
            echo "WARN: could not resolve zone id — skipping purge"
            exit 0
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${zone_id}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://significanthobbies.com/","https://www.significanthobbies.com/"]}'
          echo "Purged / on significanthobbies.com"
      - name: Smoke check production
        run: |
          html=$(curl -fsS --retry 3 --retry-delay 5 --max-time 20 \
            -H "Cache-Control: no-cache" https://significanthobbies.com/)
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "ERROR: failed to fetch homepage"
            exit 1
          fi
          sections=$(printf '%s' "$html" | grep -o '<section' | wc -l | tr -d ' ')
          if ! printf '%s' "$html" | grep -q 'location.replace('\''/dashboard'\'')'; then
            echo "ERROR: stale overlay — expected /dashboard auth redirect in Astro HTML"
            exit 1
          fi
          if [ "$sections" -lt 5 ]; then
            echo "ERROR: stale overlay — expected full Astro landing (>=5 sections), got ${sections}"
            exit 1
          fi
          if ! printf '%s' "$html" | grep -q 'id="lcp-shell"'; then
            echo "ERROR: missing LCP shell in overlaid index.html"
            exit 1
          fi
          echo "Overlay OK: ${sections} sections, LCP shell present"

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Prepare pnpm
        run: |
          corepack enable
          if node -e "const pm=require('./package.json').packageManager||''; process.exit(pm.startsWith('pnpm@')?0:1)"; then
            corepack install
          else
            corepack prepare pnpm@10.32.1 --activate
          fi
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - name: Deploy preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --minify --env preview
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed to: https://significanthobbies.workers.dev`
            })
