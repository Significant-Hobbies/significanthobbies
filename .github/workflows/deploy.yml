name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'src/**'
      - 'public/**'
      - 'drizzle/**'
      - 'scripts/cf-build.mjs'
      - 'drizzle.config.ts'
      - 'next.config.ts'
      - 'open-next.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
      - 'wrangler.toml'
  pull_request:
    branches: [main]

jobs:
  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Prepare pnpm
        run: |
          corepack enable
          if node -e "const pm=require('./package.json').packageManager||''; process.exit(pm.startsWith('pnpm@')?0:1)"; then
            corepack install
          else
            corepack prepare pnpm@10.32.1 --activate
          fi
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '7d048325699a5acddb44d3be31cf6ba9' }}
          command: deploy --minify
      - name: Smoke check production
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" \
            --retry 3 --retry-delay 5 --max-time 20 \
            https://significanthobbies.com/)
          echo "HTTP status: $status"
          if [ "$status" = "429" ] || [ "$status" = "1015" ]; then
            echo "ERROR: Cloudflare rate limiting active ($status) — remove zone-level rule in CF dashboard"
            exit 1
          fi
          [ "$status" = "200" ] || { echo "ERROR: unexpected status $status"; exit 1; }

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Prepare pnpm
        run: |
          corepack enable
          if node -e "const pm=require('./package.json').packageManager||''; process.exit(pm.startsWith('pnpm@')?0:1)"; then
            corepack install
          else
            corepack prepare pnpm@10.32.1 --activate
          fi
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - name: Deploy preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '7d048325699a5acddb44d3be31cf6ba9' }}
          command: deploy --minify --env preview
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed to: https://significanthobbies.workers.dev`
            })
