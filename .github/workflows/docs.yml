name: docs
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "STATUS.md"
      - "AGENTS.md"
      - "README.md"
      - "docs-site/**"
      - "scripts/docs-check-links.mjs"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "STATUS.md"
      - "AGENTS.md"
      - "README.md"
      - "docs-site/**"
      - "scripts/docs-check-links.mjs"
      - ".github/workflows/docs.yml"

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      # Link checker uses only Node built-ins — no install needed.
      - run: node scripts/docs-check-links.mjs

  docs-build:
    runs-on: ubuntu-latest
    needs: docs-check
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      # Install the docs-site workspace only. No pnpm-lock.yaml committed for
      # docs-site yet; use a plain install. Switch to --frozen-lockfile once a
      # lockfile is committed.
      - run: pnpm install --filter significanthobbies-docs...
      - working-directory: docs-site
        run: pnpm run build
