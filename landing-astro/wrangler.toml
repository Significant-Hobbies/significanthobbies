# Cloudflare Pages config for the significanthobbies.com landing-astro
# project.
#
# Pure-static deploy (output: "static" in astro.config.mjs).
# `wrangler pages deploy` and the Cloudflare dashboard both pick this
# file up to find the build output. No Workers runtime needed.
name = "significanthobbies-landing"
compatibility_date = "2026-06-04"
pages_build_output_dir = "dist"
