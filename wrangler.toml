name = "significanthobbies"
main = ".open-next/worker.js"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

routes = [
  { pattern = "significanthobbies.com/*", zone_name = "significanthobbies.com" },
  { pattern = "www.significanthobbies.com/*", zone_name = "significanthobbies.com" }
]

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 1000, period = 60 }

[vars]
NODE_ENV = "production"
