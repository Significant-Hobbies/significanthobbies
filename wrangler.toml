name = "significanthobbies"
main = "worker.mjs"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Serve overlaid Astro index.html for GET / without invoking the Worker
# (avoids cold-start TTFB on the LCP path). Auth redirect is inline in
# landing-astro Layout.astro; all app routes still hit worker.mjs first.
assets = { directory = ".open-next/assets", binding = "ASSETS", run_worker_first = [ "/*", "!/" ] }

routes = [
  { pattern = "significanthobbies.com/*", zone_name = "significanthobbies.com" },
  { pattern = "www.significanthobbies.com/*", zone_name = "significanthobbies.com" }
]

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[vars]
NODE_ENV = "production"

# ─── Preview environment ───────────────────────────────────────────────
# Used by the PR deploy job: `wrangler deploy --env preview`. Deploys to
# significanthobbies-preview.<account>.workers.dev (no production routes).
# Routes intentionally absent so PRs never touch the prod domain.

[env.preview]
name = "significanthobbies-preview"
# Disinherit prod routes — preview deploys to the workers.dev subdomain
# only. Without these overrides wrangler tries to attach the preview
# worker to significanthobbies.com/* and fails because the prod worker
# already owns them.
workers_dev = true
routes = []

[env.preview.observability]
enabled = true
head_sampling_rate = 0.1

[env.preview.limits]
cpu_ms = 30000

[env.preview.vars]
NODE_ENV = "production"
